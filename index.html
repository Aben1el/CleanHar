<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Har | Professional Cleaning Services</title>
    <style>
        /* --- Modern Glass Header Fixes --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        #main-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo-box {
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
            text-decoration: none;
            color: #333;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
            flex-grow: 1;
            justify-content: center;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.5rem;
        }

        @media (max-width: 992px) {
            .nav-menu, .header-actions { display: none; }
            .hamburger { display: block; }
            .nav-menu.active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: white;
                padding: 20px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            }
        }

        /* --- Hero Section --- */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: #f4f4f4; padding-top: 80px; }
    </style>
</head>
<body>

    <header id="main-header">
        <a href="#" class="logo-box">
            <span style="font-weight: 700; font-size: 1.5rem;">Clean Har</span>
        </a>

        <ul class="nav-menu" id="nav-menu">
            <li><a href="#about" style="text-decoration: none; color: #333;">About</a></li>
            <li><a href="#services" style="text-decoration: none; color: #333;">Services</a></li>
            <li><a href="#contact" style="text-decoration: none; color: #333;">Contact</a></li>
        </ul>

        <div class="header-actions">
            <span style="font-weight: 600;">097 743 0815</span>
            <a href="#book" style="padding: 10px 20px; border-radius: 20px; background: #4A90E2; color: white; text-decoration: none;">Request Quote</a>
        </div>

        <button class="hamburger" onclick="document.getElementById('nav-menu').classList.toggle('active')">
            ☰
        </button>
    </header>

    <section class="hero">
        <h1>Clean Har Professional Cleaning Service</h1>
    </section>

    <script>
        // Simple script for Hamburger menu
        function toggleMenu() {
            document.getElementById('nav-menu').classList.toggle('active');
        }
    </script>
</body>
</html>
