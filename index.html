<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Har | Premium Professional Cleaning Service Addis Ababa</title>
    
    <link rel="icon" type="image/jpeg" href="image_91d85c.jpg">
    <link rel="apple-touch-icon" href="image_91d85c.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- Refined Light Blue & Warm White Palette --- */
        :root {
            --warm-white: #FDFBF7;
            --pure-white: #FFFFFF;
            --off-white: #F4F7FB;
            
            --light-blue: #4A90E2;
            --light-blue-hover: #357ABD;
            --glow-blue: rgba(74, 144, 226, 0.25);
            --pale-blue: #EBF3FA;
            
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --gold-accent: #C5A059;
            
            --transition-fast: all 0.3s ease;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: var(--warm-white);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.2;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* --- Global Scroll Animation Engine --- */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition-smooth);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-1 { transition-delay: 0.15s; }
        .delay-2 { transition-delay: 0.3s; }
        .delay-3 { transition-delay: 0.45s; }

        /* --- Premium Responsive Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            transition: var(--transition-fast);
            text-align: center;
            border: 2px solid transparent;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--light-blue);
            color: var(--pure-white);
            box-shadow: 0 4px 15px var(--glow-blue);
        }

        .btn-primary:hover {
            background-color: var(--light-blue-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--glow-blue);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--light-blue);
            border-color: var(--light-blue);
        }

        .btn-secondary:hover {
            background-color: var(--pale-blue);
            transform: translateY(-2px);
        }

        /* --- Updated Premium Header --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 80px;
            z-index: 1000;
            background: rgba(253, 251, 247, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(74, 144, 226, 0.1);
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
        }

        header.scrolled {
            height: 70px;
            background: rgba(253, 251, 247, 0.95);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-box img { height: 40px; width: auto; }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            transition: var(--transition-fast);
            white-space: nowrap;
        }

        .nav-menu a:hover { color: var(--light-blue); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .phone-link {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            border: none;
            background: none;
        }

        .hamburger span {
            width: 25px; height: 2px;
            background: var(--text-dark);
            transition: var(--transition-fast);
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 1024px) {
            .nav-menu { display: none; }
            .hamburger { display: flex; }
            .nav-container.active {
                display: flex; flex-direction: column;
                position: absolute; top: 80px; left: 0; width: 100%;
                background: var(--pure-white); padding: 20px;
                border-bottom: 1px solid var(--pale-blue);
            }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="container header-wrap">
            <a href="#" class="logo-box">
                <img src="image_91d85c.jpg" alt="Logo">
                <span class="logo-text">Clean Har</span>
            </a>
            
            <div class="nav-container" id="mobile-nav">
                <ul class="nav-menu">
                    <li><a href="#about">About</a></li>
                    <li><a href="#services">Services</a></li>
                    <li><a href="#book">Contact</a></li>
                </ul>
                <div class="header-actions">
                    <a href="tel:0977430815" class="phone-link">097 743 0815</a>
                    <a href="#book" class="btn btn-primary">Request Quote</a>
                </div>
            </div>

            <button class="hamburger" id="hamburger-btn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const header = document.getElementById('main-header');
            const ham = document.getElementById('hamburger-btn');
            const nav = document.getElementById('mobile-nav');

            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY > 50);
            });

            ham.addEventListener('click', () => {
                nav.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
